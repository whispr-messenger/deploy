apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  labels:
    app: notification-service
    environment: staging
data:
  MIX_ENV: "prod"
  PHX_SERVER: "true"
  PORT: "4000"
  LOG_LEVEL: "debug"
  POOL_SIZE: "10"
  DB_HOST: "postgresql.postgresql.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "notification_service_staging_db"
  JWT_JWKS_URL: "http://auth-service.whispr-staging.svc.cluster.local:3001/auth/.well-known/jwks.json"
  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
