apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduling-service-config
  labels:
    app: scheduling-service
    environment: staging
data:
  NODE_ENV: "staging"
  PORT: "3000"
  GRPC_PORT: "3001"
  LOG_LEVEL: "debug"
  DB_HOST: "postgresql.postgresql.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "scheduling_service_staging_db"
  DB_TYPE: "postgres"
  HTTP_PORT: "3000"
  MESSAGING_SERVICE_HOST: "messaging-service.whispr-staging.svc.cluster.local"
  MESSAGING_SERVICE_PORT: "4001"
  NOTIFICATION_SERVICE_HOST: "notification-service.whispr-staging.svc.cluster.local"
  NOTIFICATION_SERVICE_PORT: "4000"
  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "5"
  REDIS_MODE: "sentinel"
  REDIS_SENTINELS: "redis.redis.svc.cluster.local:26379"
  REDIS_MASTER_NAME: "mymaster"
  JWT_JWKS_URL: "http://auth-service.whispr-staging.svc.cluster.local:3001/auth/.well-known/jwks.json"
