apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: whispr-staging
resources:
- ../../../base/user-service
- configmap.yaml
labels:
- pairs:
    environment: staging
  includeSelectors: false
patches:
- target:
    group: secrets.hashicorp.com
    version: v1beta1
    kind: VaultAuth
    name: user-service-vault-auth
  patch: |
    - op: replace
      path: /spec/kubernetes/role
      value: user-service-staging
- target:
    group: secrets.hashicorp.com
    version: v1beta1
    kind: VaultDynamicSecret
    name: user-service-db-creds
  patch: |
    - op: replace
      path: /spec/path
      value: creds/role_user_service_staging
- target:
    group: secrets.hashicorp.com
    version: v1beta1
    kind: VaultDynamicSecret
    name: user-service-redis-creds
  patch: |
    - op: replace
      path: /spec/path
      value: creds/redis_role_user_service_staging
images:
- name: ghcr.io/whispr-messenger/user-service/user-service
  newTag: sha-0edce8a
