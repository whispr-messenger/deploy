apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  labels:
    app: user-service
    tier: backend
    environment: staging
data:
  NODE_ENV: "staging"
  PORT: "3001"
  HTTP_PORT: "3001"
  GRPC_PORT: "50051"
  DB_TYPE: "postgres"
  DB_HOST: "postgresql.postgresql.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "user_service_staging_db"
  DB_MIGRATIONS_RUN: "false"
  DB_SYNCHRONIZE: "false"
  DB_LOGGING: "true"
  DB_SSL: "false"
  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "1"
  REDIS_MODE: "sentinel"
  REDIS_SENTINELS: "redis.redis.svc.cluster.local:26379"
  REDIS_MASTER_NAME: "mymaster"
  USER_SERVICE_GRPC_URL: "user-service:50052"
  MEDIA_SERVICE_GRPC_URL: "media-service:50053"
  MEDIA_SERVICE_URL: "http://media-service.whispr-staging.svc.cluster.local:3001"
  API_PREFIX: "/api"
  ENABLE_CORS: "false"
  SWAGGER_ENABLED: "true"
  LOG_LEVEL: "debug"
  METRICS_ENABLED: "true"
  HEALTH_CHECK_TIMEOUT: "5000"
  SERVICE_NAME: "user-service"
  SERVICE_VERSION: "1.0.0"
  JWT_JWKS_URL: "http://auth-service.whispr-staging.svc.cluster.local:3001/auth/.well-known/jwks.json"
  JWT_ISSUER: "https://auth.staging.whispr.epitech.beer"
  JWT_AUDIENCE: "whispr-api"
