apiVersion: v1
kind: Service
metadata:
  name: media-service
  labels:
    app: media-service
    tier: backend
  annotations:
    description: "Service for Media microservice"
spec:
  type: ClusterIP
  selector:
    app: media-service
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  sessionAffinity: None
