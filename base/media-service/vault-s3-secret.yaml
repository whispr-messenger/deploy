---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: media-service-s3-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultAuthRef: media-service-vault-auth
  mount: kv
  type: kv-v2
  path: whispr/minio/root
  destination:
    name: media-service-s3-secret
    create: true
  refreshAfter: 1h
