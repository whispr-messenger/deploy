---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: user-service-redis-sentinel
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultAuthRef: user-service-vault-auth
  mount: kv
  type: kv-v2
  path: whispr/shared/redis
  destination:
    name: user-service-redis-sentinel-secret
    create: true
  refreshAfter: 1h
