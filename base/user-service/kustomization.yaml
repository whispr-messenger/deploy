apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - service-account.yaml
  - vault-auth.yaml
  - vault-dynamic-secret.yaml
  - vault-public-jwt.yaml
  - vault-redis-secret.yaml
  - vault-sentinel-secret.yaml
  - deployment.yaml
  - service.yaml
  - migration-job.yaml

labels:
  - pairs:
      app.kubernetes.io/name: user-service
      app.kubernetes.io/part-of: whispr
    includeSelectors: false
