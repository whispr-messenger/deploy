---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: notification-service-vault-auth
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: notification-service
    serviceAccount: notification-service-sa
    audiences:
      - vault
