---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: notification-service-images
  namespace: whispr
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  subscriptions:
    - image:
        repoURL: ghcr.io/whispr-messenger/notification-service
        imageSelectionStrategy: SemVer
        allowTags: "^sha-.+$"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: notification-service-staging
  namespace: whispr
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: notification-service-images
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/whispr-messenger/deploy.git
            checkout:
              - branch: main
                path: ./deploy
        - uses: kustomize-set-image
          config:
            path: ./deploy/overlays/staging/notification-service
            images:
              - image: ghcr.io/whispr-messenger/notification-service
        - uses: git-commit
          config:
            path: ./deploy
            messageTemplate: |
              chore(staging): promote notification-service
        - uses: git-push
          config:
            path: ./deploy
        - uses: argocd-update
          config:
            apps:
              - name: notification-service-staging
                sources:
                  - repoURL: https://github.com/whispr-messenger/deploy.git
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: notification-service-production
  namespace: whispr
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: notification-service-images
      sources:
        stages:
          - notification-service-staging
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/whispr-messenger/deploy.git
            checkout:
              - branch: main
                path: ./deploy
        - uses: kustomize-set-image
          config:
            path: ./deploy/overlays/production/notification-service
            images:
              - image: ghcr.io/whispr-messenger/notification-service
        - uses: git-commit
          config:
            path: ./deploy
            messageTemplate: |
              chore(production): promote notification-service
        - uses: git-push
          config:
            path: ./deploy
        - uses: argocd-update
          config:
            apps:
              - name: notification-service-production
                sources:
                  - repoURL: https://github.com/whispr-messenger/deploy.git
