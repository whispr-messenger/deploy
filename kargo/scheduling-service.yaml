---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: scheduling-service-images
  namespace: whispr
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  subscriptions:
    - image:
        repoURL: ghcr.io/whispr-messenger/scheduling-service/scheduling-service
        imageSelectionStrategy: NewestBuild
        allowTags: "^sha-[a-f0-9]{7}$"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: scheduling-service-staging
  namespace: whispr
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: scheduling-service-images
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/whispr-messenger/deploy.git
            checkout:
              - branch: main
                path: ./deploy
        - uses: kustomize-set-image
          config:
            path: ./deploy/overlays/staging/scheduling-service
            images:
              - image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service
                tag: ${{ imageFrom("ghcr.io/whispr-messenger/scheduling-service/scheduling-service").Tag }}
        - uses: git-commit
          config:
            path: ./deploy
            messageTemplate: |
              chore(staging): promote scheduling-service
        - uses: git-push
          config:
            path: ./deploy
        - uses: argocd-update
          config:
            apps:
              - name: scheduling-service-staging
                sources:
                  - repoURL: https://github.com/whispr-messenger/deploy.git
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: scheduling-service-production
  namespace: whispr
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: scheduling-service-images
      sources:
        stages:
          - scheduling-service-staging
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/whispr-messenger/deploy.git
            checkout:
              - branch: main
                path: ./deploy
        - uses: kustomize-set-image
          config:
            path: ./deploy/overlays/production/scheduling-service
            images:
              - image: ghcr.io/whispr-messenger/scheduling-service/scheduling-service
                tag: ${{ imageFrom("ghcr.io/whispr-messenger/scheduling-service/scheduling-service").Tag }}
        - uses: git-commit
          config:
            path: ./deploy
            messageTemplate: |
              chore(production): promote scheduling-service
        - uses: git-push
          config:
            path: ./deploy
        - uses: argocd-update
          config:
            apps:
              - name: scheduling-service-production
                sources:
                  - repoURL: https://github.com/whispr-messenger/deploy.git
